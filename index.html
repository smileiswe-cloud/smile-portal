<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Smile Mobile & Cosmetics</title>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', 'Padauk', sans-serif; background: #f8fafc; margin: 0; padding: 0; padding-bottom: 80px; }
        
        .header-section { background: #111111; padding: 20px 15px 15px 15px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .logo-container { display: flex; align-items: center; gap: 8px; }
        .logo-smile { font-family: 'Impact', sans-serif; color: #ec008c; font-size: 28px; font-weight: 900; text-transform: uppercase; text-shadow: 2px 2px 0px #000; }
        .logo-mobile { font-family: 'Arial', sans-serif; color: #ffffff; font-size: 16px; }
        .date-badge { color: #888; font-size: 11px; margin-top: 8px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .login-link { font-size: 12px; color: #aaa; cursor: pointer; border: 1px solid #444; padding: 4px 10px; border-radius: 6px; }
        
        .category-tabs { display: flex; gap: 12px; padding: 0 15px; margin-bottom: 20px; }
        .cat-tab { flex: 1; padding: 12px; border-radius: 30px; text-align: center; font-weight: 600; font-size: 14px; cursor: pointer; background: white; border: 1px solid #e2e8f0; }
        .cat-tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .cat-tab.cosmetic.active { background: linear-gradient(135deg, #ec008c 0%, #f093fb 100%); }
        
        .filters { display: flex; gap: 10px; padding: 0 15px; margin-bottom: 20px; }
        .control-input { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; width: 100%; background: white; font-family: inherit; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 0 15px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #f0f0f0; }
        .card-body { padding: 12px; }
        .brand-tag { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .model-name { font-weight: 700; font-size: 14px; margin: 5px 0; color: #1e293b; }
        .model-spec { font-size: 11px; color: #64748b; margin-bottom: 8px; }
        .sell-price { color: #2563eb; font-weight: 800; font-size: 16px; }
        .order-btn { background: #2563eb; color: white; border: none; padding: 8px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
        
        .contact-widget { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toggle-btn { width: 55px; height: 55px; background: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(37,99,235,0.4); cursor: pointer; color: white; font-size: 24px; }
        .contact-menu { position: absolute; bottom: 70px; right: 0; background: white; width: 200px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); padding: 10px; display: none; }
        .contact-menu.show { display: block; }
        .menu-item { display: block; padding: 8px; text-decoration: none; color: #333; font-size: 13px; border-radius: 6px; }
        .menu-item:hover { background: #f1f5f9; }
        
        .loading-state, .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
        
        .cosmetic-price { color: #ec008c; }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="top-row">
            <div class="logo-container">
                <span class="logo-smile">SMILE</span>
                <span class="logo-mobile">Mobile & Cosmetics</span>
            </div>
            <span onclick="openLogin()" id="loginStatus" class="login-link">Login</span>
        </div>
        <div class="date-badge" id="currentDate"></div>
    </div>
    
    <div class="category-tabs">
        <div class="cat-tab active" data-cat="all" onclick="setCategory('all', this)">📱 All Products</div>
        <div class="cat-tab" data-cat="Mobile" onclick="setCategory('Mobile', this)">📱 Mobile</div>
        <div class="cat-tab cosmetic" data-cat="Cosmetic" onclick="setCategory('Cosmetic', this)">💄 Cosmetics</div>
    </div>
    
    <div class="filters">
        <select id="brandFilter" class="control-input" onchange="filterData()"><option value="All">All Brands</option></select>
        <input type="text" id="searchInput" class="control-input" placeholder="Search..." onkeyup="filterData()">
    </div>
    
    <div id="loading" class="loading-state">Loading...</div>
    <div id="content" class="grid-container"></div>
    
    <div class="contact-widget">
        <div id="contactMenu" class="contact-menu">
            <a href="tel:+959780001662" class="menu-item">📞 Call Yuzana Plaza</a>
            <a href="tel:+959780001682" class="menu-item">📞 Call GMP Shop</a>
            <a href="viber://chat?number=959780001662" class="menu-item">💬 Viber Yuzana</a>
            <a href="viber://chat?number=959780001682" class="menu-item">💬 Viber GMP</a>
            <a href="https://t.me/+959780001662" class="menu-item">✈️ Telegram Yuzana</a>
            <a href="https://t.me/+959780001682" class="menu-item">✈️ Telegram GMP</a>
        </div>
        <div class="toggle-btn" onclick="toggleContactMenu()">📞</div>
    </div>
    
    <div id="loginModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
        <div class="modal-content" style="background:white; padding:20px; border-radius:16px; width:90%; max-width:400px;">
            <h3>Login</h3>
            <input type="text" id="username" class="form-input" placeholder="Username" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="password" id="password" class="form-input" placeholder="Password" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <button class="btn btn-primary" onclick="doLogin()" style="width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:8px;">Login</button>
            <button class="btn btn-secondary" onclick="closeModal('loginModal')" style="width:100%; padding:12px; margin-top:10px; background:#f1f5f9; border:none; border-radius:8px;">Close</button>
        </div>
    </div>
    
    <script>
        // =====================================================
        // SMILE PORTAL - COMPLETE VERSION
        // =====================================================
        
        // ✅ UPDATE THIS URL WITH YOUR WORKER URL
        var API_URL = 'https://smilepotal.smileiswe.workers.dev/';
        
        var allData = [];
        var currentCategory = 'all';
        var currentFilteredData = [];
        
        window.onload = function() {
            var d = new Date();
            document.getElementById('currentDate').innerText = "📅 " + d.toLocaleDateString();
            fetchData('all');
        };
        
        // ✅ FETCH DATA FROM WORKER (JSONP)
        function fetchData(category) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').innerHTML = '';
            
            var url = API_URL + '?callback=handleData&action=getData';
            if (category && category !== 'all') {
                url += '&category=' + category;
            }
            
            var script = document.createElement('script');
            script.src = url;
            script.onerror = function() {
                document.getElementById('loading').innerHTML = '❌ Connection error. Please refresh.';
            };
            document.body.appendChild(script);
        }
        
        // ✅ HANDLE DATA FROM WORKER
        function handleData(data) {
            console.log("Received:", data.length, "products");
            
            if (data && data.length > 0) {
                allData = data;
                document.getElementById('loading').style.display = 'none';
                updateBrandFilter();
                displayProducts(allData);
            } else if (data && data.error) {
                document.getElementById('loading').innerHTML = '❌ ' + data.error;
            } else {
                document.getElementById('loading').innerHTML = '❌ No products found';
                document.getElementById('content').innerHTML = '<div class="empty-state">No products found.</div>';
            }
        }
        
        // ✅ DISPLAY PRODUCTS
        function displayProducts(products) {
            var container = document.getElementById('content');
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="empty-state">No products found.</div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                var priceClass = (p.category === 'Cosmetic') ? 'cosmetic-price' : '';
                var brand = p.brand || '';
                var spec = p.spec || '';
                var name = p.name || '';
                
                html += `
                    <div class="card">
                        <img src="https://via.placeholder.com/300?text=${encodeURIComponent(brand)}" class="card-img" loading="lazy">
                        <div class="card-body">
                            <div class="brand-tag">${escapeHtml(brand)}</div>
                            <div class="model-name">${escapeHtml(name)}</div>
                            <div class="model-spec">${escapeHtml(spec)}</div>
                            <div class="sell-price ${priceClass}">${formatPrice(p.price)} Ks</div>
                            <button class="order-btn" onclick="orderProduct('${p.skid}')">Order Now</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // ✅ UPDATE BRAND FILTER
        function updateBrandFilter() {
            var brands = {};
            for (var i = 0; i < allData.length; i++) {
                if (allData[i].brand && allData[i].brand !== "") {
                    brands[allData[i].brand] = true;
                }
            }
            var brandList = Object.keys(brands).sort();
            var select = document.getElementById('brandFilter');
            select.innerHTML = '<option value="All">All Brands</option>';
            for (var i = 0; i < brandList.length; i++) {
                select.innerHTML += '<option value="' + escapeHtml(brandList[i]) + '">' + escapeHtml(brandList[i]) + '</option>';
            }
        }
        
        // ✅ FILTER DATA
        function filterData() {
            var searchTerm = document.getElementById('searchInput').value.toLowerCase();
            var brand = document.getElementById('brandFilter').value;
            
            var filtered = allData.filter(function(p) {
                if (currentCategory !== 'all' && p.category !== currentCategory) return false;
                if (brand !== 'All' && p.brand !== brand) return false;
                if (searchTerm) {
                    var searchText = (p.name + " " + p.brand + " " + p.spec).toLowerCase();
                    if (!searchText.includes(searchTerm)) return false;
                }
                return true;
            });
            
            displayProducts(filtered);
        }
        
        // ✅ SET CATEGORY
        function setCategory(cat, element) {
            currentCategory = cat;
            
            var tabs = document.querySelectorAll('.cat-tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            if (element) element.classList.add('active');
            
            fetchData(cat);
        }
        
        // ✅ ORDER PRODUCT
        function orderProduct(skid) {
            alert("Order feature coming soon!\nSKID: " + skid);
        }
        
        // ✅ HELPER FUNCTIONS
        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function toggleContactMenu() {
            var menu = document.getElementById('contactMenu');
            menu.classList.toggle('show');
        }
        
        function openLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }
        
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
        
        function doLogin() {
            alert("Login feature coming soon!");
            closeModal('loginModal');
        }
        
        // Close contact menu when clicking outside
        document.addEventListener('click', function(e) {
            var widget = document.querySelector('.contact-widget');
            if (widget && !widget.contains(e.target)) {
                document.getElementById('contactMenu').classList.remove('show');
            }
        });
    </script>
</body>
</html>
