index.html<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Smile Mobile & Cosmetics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', 'Padauk', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        .header {
            background: #111;
            color: white;
            padding: 24px 20px;
            border-radius: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #ec008c;
        }
        
        .logo-smile {
            color: #ec008c;
            font-size: 28px;
            font-weight: bold;
        }
        
        .logo-mobile {
            font-size: 14px;
            color: #aaa;
        }
        
        .category-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .cat-tab {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        
        .cat-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        
        .cat-tab.cosmetic.active {
            background: linear-gradient(135deg, #ec008c 0%, #f093fb 100%);
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .control-input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            width: 100%;
            outline: none;
            background: white;
            font-family: inherit;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f1f5f9;
        }
        
        .card-body {
            padding: 12px;
        }
        
        .brand-tag {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 700;
        }
        
        .model-name {
            font-weight: 700;
            font-size: 14px;
            margin: 4px 0;
            color: #1e293b;
        }
        
        .model-spec {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .price-area {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .sell-price {
            color: #2563eb;
            font-weight: 800;
            font-size: 16px;
        }
        
        .sell-price.cosmetic {
            color: #ec008c;
        }
        
        .loading-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }
        
        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: #e74c3c;
            background: #fee;
            border-radius: 16px;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            padding: 16px;
            color: #bbb;
            font-size: 11px;
        }
        
        .contact-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
        
        .toggle-btn {
            width: 55px;
            height: 55px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            cursor: pointer;
            color: white;
        }
        
        .contact-menu {
            position: absolute;
            bottom: 70px;
            right: 0;
            background: white;
            width: 200px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            padding: 10px;
            display: none;
        }
        
        .contact-menu.show {
            display: block;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            text-decoration: none;
            color: #333;
            font-size: 13px;
            border-radius: 8px;
        }
        
        .menu-item:active {
            background: #f0f0f0;
        }
        
        .menu-header {
            font-size: 10px;
            font-weight: bold;
            color: #aaa;
            padding: 5px 10px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .modal-content button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-smile">SMILE</div>
        <div class="logo-mobile">Mobile & Cosmetics</div>
    </div>
    
    <div class="category-tabs">
        <div class="cat-tab active" data-cat="all" onclick="setCategory('all')">📱 All</div>
        <div class="cat-tab" data-cat="Mobile" onclick="setCategory('Mobile')">📱 Mobile</div>
        <div class="cat-tab cosmetic" data-cat="Cosmetic" onclick="setCategory('Cosmetic')">💄 Cosmetics</div>
    </div>
    
    <div class="filters">
        <select id="brandFilter" class="control-input" onchange="filterData()">
            <option value="All">All Brands</option>
        </select>
        <input type="text" id="searchInput" class="control-input" placeholder="🔍 Search..." onkeyup="filterData()">
    </div>
    
    <div id="loading" class="loading-state">⏳ Loading...</div>
    <div id="content" class="grid-container"></div>
    
    <div class="footer">Powered by SMILE System</div>
    
    <div class="contact-widget">
        <div id="contactMenu" class="contact-menu">
            <div class="menu-header">📞 Contact Us</div>
            <a href="tel:+959780001662" class="menu-item">📞 Yuzana Plaza (09 780001662)</a>
            <a href="tel:+959780001682" class="menu-item">📞 GMP Shop (09 780001682)</a>
            <a href="viber://chat?number=959780001662" class="menu-item">💬 Viber - Yuzana</a>
            <a href="viber://chat?number=959780001682" class="menu-item">💬 Viber - GMP</a>
        </div>
        <div class="toggle-btn" onclick="toggleContactMenu()">💬</div>
    </div>
    
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Product Details</h3>
            <img id="modalImg" src="" style="width: 100%; border-radius: 16px; margin: 10px 0;">
            <p id="modalBrand"></p>
            <p id="modalSpec"></p>
            <p id="modalPrice" style="font-size: 24px; font-weight: bold; color: #2563eb;"></p>
            <button class="btn-primary" onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>🔐 Admin Login</h3>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-primary" onclick="doLogin()">Login</button>
            <button class="btn-secondary" onclick="closeLoginModal()">Cancel</button>
        </div>
    </div>

    <script>
        // =====================================================
        // CONFIGURATION
        // =====================================================
        
        // ⚠️ သင့် Apps Script URL ကို ဒီမှာ ထည့်ပါ
        const API_URL = 'https://script.google.com/macros/s/AKfycbxm4_jlIHyGLIxy9x03MXjBqvnY_u_lzA8JgV6mi8ZvEmGd2bv-6Js-Czl1HJigHyYo/exec';
        
        let allData = [];
        let currentCategory = 'all';
        
        // =====================================================
        // MAIN FUNCTIONS
        // =====================================================
        
        window.onload = function() {
            fetchData();
        };
        
        async function fetchData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').innerHTML = '';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getData' })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                allData = data;
                updateBrandFilter();
                renderList();
                document.getElementById('loading').style.display = 'none';
                
            } catch(err) {
                console.error('Fetch error:', err);
                document.getElementById('loading').innerHTML = `<div class="error-state">❌ Connection Error<br><br>Please check your internet connection.<br><br>URL: ${API_URL}</div>`;
            }
        }
        
        function updateBrandFilter() {
            var brands = [...new Set(allData.map(item => item[1]))];
            var select = document.getElementById('brandFilter');
            select.innerHTML = '<option value="All">All Brands</option>';
            brands.forEach(brand => {
                if(brand) {
                    var option = document.createElement('option');
                    option.value = brand;
                    option.textContent = brand;
                    select.appendChild(option);
                }
            });
        }
        
        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.cat-tab[data-cat="${cat}"]`).classList.add('active');
            filterData();
        }
        
        function filterData() {
            var searchTerm = document.getElementById('searchInput').value.toLowerCase();
            var brand = document.getElementById('brandFilter').value;
            
            var filtered = allData.filter(item => {
                var matchesCategory = currentCategory === 'all' || item[0] === currentCategory;
                var matchesBrand = brand === 'All' || item[1] === brand;
                var matchesSearch = (item[1] + " " + item[2] + " " + item[3]).toLowerCase().includes(searchTerm);
                return matchesCategory && matchesBrand && matchesSearch;
            });
            
            renderList(filtered);
        }
        
        function formatPrice(price) {
            if (!price) return '0';
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }
        
        function renderList(data) {
            if (!data || data.length === 0) {
                document.getElementById('content').innerHTML = '<div class="empty-state">📱 No products found</div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < data.length; i++) {
                var item = data[i];
                var category = item[0];
                var brand = item[1];
                var model = item[2];
                var spec = item[3];
                var price = item[4];
                var imageUrl = (item[9] && item[9] !== '') ? item[9].split(',')[0] : 'https://via.placeholder.com/300x300?text=No+Image';
                var isCosmetic = category === 'Cosmetic';
                var priceColor = isCosmetic ? 'cosmetic' : '';
                
                html += `
                    <div class="card" onclick="showProductDetail(${i})">
                        <img src="${imageUrl}" class="card-img" loading="lazy" onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'">
                        <div class="card-body">
                            <div class="brand-tag">${escapeHtml(brand)}</div>
                            <div class="model-name">${escapeHtml(model)}</div>
                            <div class="model-spec">${escapeHtml(spec)}</div>
                            <div class="price-area">
                                <span class="sell-price ${priceColor}">💰 ${formatPrice(price)} Ks</span>
                            </div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('content').innerHTML = html;
        }
        
        function showProductDetail(index) {
            // Get current filtered list
            var searchTerm = document.getElementById('searchInput').value.toLowerCase();
            var brand = document.getElementById('brandFilter').value;
            var filtered = allData.filter(item => {
                var matchesCategory = currentCategory === 'all' || item[0] === currentCategory;
                var matchesBrand = brand === 'All' || item[1] === brand;
                var matchesSearch = (item[1] + " " + item[2] + " " + item[3]).toLowerCase().includes(searchTerm);
                return matchesCategory && matchesBrand && matchesSearch;
            });
            
            var item = filtered[index];
            if (!item) return;
            
            var isCosmetic = item[0] === 'Cosmetic';
            var imageUrl = (item[9] && item[9] !== '') ? item[9].split(',')[0] : 'https://via.placeholder.com/300x300?text=No+Image';
            
            document.getElementById('modalTitle').innerHTML = `${escapeHtml(item[1])} ${escapeHtml(item[2])}`;
            document.getElementById('modalImg').src = imageUrl;
            document.getElementById('modalBrand').innerHTML = `<strong>Brand:</strong> ${escapeHtml(item[1])}`;
            document.getElementById('modalSpec').innerHTML = `<strong>Spec:</strong> ${escapeHtml(item[3])}`;
            document.getElementById('modalPrice').innerHTML = `${formatPrice(item[4])} Ks`;
            document.getElementById('modalPrice').style.color = isCosmetic ? '#ec008c' : '#2563eb';
            document.getElementById('productModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }
        
        // =====================================================
        // CONTACT MENU
        // =====================================================
        
        function toggleContactMenu() {
            var menu = document.getElementById('contactMenu');
            menu.classList.toggle('show');
        }
        
        document.addEventListener('click', function(e) {
            var widget = document.querySelector('.contact-widget');
            if (widget && !widget.contains(e.target)) {
                document.getElementById('contactMenu').classList.remove('show');
            }
        });
        
        // =====================================================
        // ADMIN LOGIN
        // =====================================================
        
        function openLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }
        
        async function doLogin() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            
            try {
                var response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'checkLogin', username: username, password: password })
                });
                var result = await response.json();
                
                if (result.status === 'success') {
                    alert('Login successful!');
                    closeLoginModal();
                    // Reload for admin features
                    fetchData();
                } else {
                    alert('Login failed!');
                }
            } catch(err) {
                alert('Error: ' + err.message);
            }
        }
        
        // =====================================================
        // HELPER FUNCTIONS
        // =====================================================
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
